name: 'Deploy via VPN'
description: 'Connect to VPN and deploy Docker image via Ansible script'

inputs:
  docker-username:
    description: "Docker username for authentication"
    default: ${{ github.actor }}
    required: false
  docker-password:
    description: "Docker password for authentication"
    required: false
  app-name:
    description: "Name of the application to deploy"
    required: true
  version-number:
    description: "Version number for the deployment"
    default: ${{ github.run_number }}
    required: true
  docker-registry:
    description: "Docker registry URL. If not provided, defaults to Github Docker Hub."
    default: "ghcr.io"
    required: false
  vpn-conf:
    description: "VPN configuration"
    required: true
  vpn-client-cert:
    description: "VPN client certificate"
    required: true
  vpn-client-key:
    description: "VPN client key"
    required: true
  vpn-ca-cert:
    description: "VPN CA certificate"
    required: true
  vpn-ta-key:
    description: "VPN TLS auth key"
    required: true
  docker-image:
    description: "Docker image to deploy"
    required: false
  awx-username:
    description: "AWX username for authentication"
    required: true
  awx-password:
    description: "AWX password for authentication"
    required: true
  awx-services-id:
    description: "AWX services ID for deployment"
    required: true
  tars-slack-webhook-url:
    description: "Slack webhook URL for notifications"
    required: true
  deploy-env:
    description: "Deployment environment (e.g., staging,test, production)"
    default: "staging"
    required: true
  health-check-url:
    description: "URL to check deployment health (optional)"
    required: false
  health-check-timeout:
    description: "Timeout in seconds for health check"
    default: "300"
    required: false
  rollback-enabled:
    description: "Enable automatic rollback on deployment failure"
    default: "true"
    required: false
  time-bypass:
    description: "Bypass time-based deployment restrictions in AWX"
    default: "false"
    required: false

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
          fetch-depth: 0

    - name: Install Dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y openvpn ansible openssh-client traceroute
      shell: bash
    
    - name: Set Up VPN Config
      run: |
          # Vérifier que le secret VPN_CONFIG existe et n'est pas vide
          if [[ -z "${{ inputs.vpn-conf }}" ]]; then
            echo "Erreur: Le secret VPN_CONFIG est vide ou n'existe pas"
            exit 1
          fi

          # Écrire la configuration VPN directement (non encodée)
          echo "${{ inputs.vpn-conf }}" > vpn.conf

          # Setup certificate-based authentication for VPN
          if [[ -n "${{ inputs.vpn-client-cert }}" && -n "${{ inputs.vpn-client-key }}" ]]; then
            echo "${{ inputs.vpn-client-cert }}" > github.crt
            echo "${{ inputs.vpn-client-key }}" > github.key
            echo "cert github.crt" >> vpn.conf
            echo "key github.key" >> vpn.conf
            chmod 600 github.key  # Secure the private key file
          fi

          # Add CA certificate if available
          if [[ -n "${{ inputs.vpn-ca-cert }}" ]]; then
            echo "${{ inputs.vpn-ca-cert }}" > ca.crt
            echo "ca ca.crt" >> vpn.conf
          fi

          # Add TLS auth key if available
          if [[ -n "${{ inputs.vpn-ta-key }}" ]]; then
            echo "${{ inputs.vpn-ta-key }}" > ta.key
            echo "tls-auth ta.key 1" >> vpn.conf
            chmod 600 ta.key  # Secure the TLS auth key file
          fi

          # Vérifier que le fichier vpn.conf a été créé
          if [[ ! -f vpn.conf ]]; then
            echo "Erreur: Le fichier vpn.conf n'a pas été créé"
            exit 1
          fi

          echo "Configuration VPN configurée avec succès"
      shell: bash

    - name: Connect to VPN
      run: |
                  sudo openvpn --config vpn.conf --daemon

                  echo "=== Attente de l'établissement du tunnel VPN ==="
                  MAX_WAIT=30
                  WAITED=0
                  while [[ $WAITED -lt $MAX_WAIT ]]; do
                    if ip a show tun0 > /dev/null 2>&1; then
                      echo "Interface VPN tun0 détectée après ${WAITED}s"
                      sleep 5  # stabilisation
                      break
                    fi
                    sleep 2
                    WAITED=$((WAITED + 2))
                  done

                  if ! ip a show tun0 > /dev/null 2>&1; then
                    echo "Erreur: le tunnel VPN (tun0) ne s'est pas établi en ${MAX_WAIT}s"
                    exit 1
                  fi

                  echo "=== Debug: interfaces VPN ==="
                  ip a
                  echo "=== Vérification des routes ==="
                  ip route
                  echo "=== Traceroute ==="
                  traceroute ansible.cluster.auctelia.com || true
                  echo "=== Test DNS ==="
                  nslookup ansible.cluster.auctelia.com || true
                  echo "=== Test ping ==="
                  ping -c 3 ansible.cluster.auctelia.com || true
      shell: bash

    - name: Fix route to cluster
      run: |
          sudo ip route del 10.1.0.0/20 dev eth0 || true
          sudo ip route add 10.0.0.0/16 dev tun0 || true
      shell: bash

    - name: Get Current Deployment State
      id: get-current-state
      run: |
          # Get current running version before deployment
          CURRENT_VERSION=$(curl -s --max-time 30 --connect-timeout 10 -u "${{ inputs.awx-username }}:${{ inputs.awx-password }}" \
            "http://ansible.cluster.auctelia.com/api/v2/job_templates/${{ inputs.awx-services-id }}/" \
            | jq -r '.extra_vars.deploy_image_tag // "unknown"' || echo "unknown")
          
          echo "current-version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "Previous deployment version: ${CURRENT_VERSION}"
      shell: bash

    - name: Call Ansible Deployment API
      id: deploy
      run: |
                # Le tunnel VPN perd fréquemment le paquet de réponse d'un POST
                # alors qu'AWX a bien reçu et lancé le job. On ne fait donc pas
                # échouer l'étape sur une erreur réseau de réception/envoi : on
                # retombe sur la récupération du dernier job du template.
                set +e
                RESPONSE=$(curl -s --max-time 30 --connect-timeout 10 \
                  -X POST "http://ansible.cluster.auctelia.com/api/v2/job_templates/${{ inputs.awx-services-id }}/launch/" \
                  -H "Content-Type: application/json" \
                  -u "${{ inputs.awx-username }}:${{ inputs.awx-password }}" \
                  -d '{
                        "extra_vars":{
                          "deploy_env": "${{ inputs.deploy-env }}",
                          "deploy_image_tag": "v${{ github.run_number }}",
                          "docker_image": "${{ inputs.docker-image }}",
                          "time_bypass": "${{ inputs.time-bypass }}"
                        }
                    }')
                CURL_EXIT_CODE=$?
                set -e

                JOB_ID=$(echo "$RESPONSE" | jq -r '.id // empty' 2>/dev/null || echo "")

                # Codes curl réseau: 7 connect, 28 timeout, 55 send, 56 recv.
                # La requête a probablement abouti côté AWX malgré l'erreur.
                if [[ -z "$JOB_ID" ]]; then
                  echo "Réponse de lancement vide ou incomplète (curl exit ${CURL_EXIT_CODE})."
                  echo "Réponse: $RESPONSE"
                  echo "Récupération du dernier job du template ${{ inputs.awx-services-id }}..."
                  JOB_ID=$(curl -s --max-time 30 --connect-timeout 10 \
                    -u "${{ inputs.awx-username }}:${{ inputs.awx-password }}" \
                    "http://ansible.cluster.auctelia.com/api/v2/job_templates/${{ inputs.awx-services-id }}/jobs/?order_by=-created&page_size=1" \
                    | jq -r '.results[0].id // empty' 2>/dev/null || echo "")
                fi

                if [[ -z "$JOB_ID" ]]; then
                  echo "Échec: impossible de récupérer un job ID, même en fallback."
                  exit 1
                fi

                echo "job-id=${JOB_ID}" >> $GITHUB_OUTPUT
                echo "Deployment job started with ID: ${JOB_ID}"
      shell: bash

    - name: Wait for Deployment to Complete
      id: wait-deploy
      run: |
          JOB_ID="${{ steps.deploy.outputs.job-id }}"
          TIMEOUT=600  # 10 minutes timeout
          ELAPSED=0
          INTERVAL=10
          
          echo "Waiting for deployment job ${JOB_ID} to complete..."
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Le VPN est intermittent: un poll qui échoue (timeout/drop) ne doit
            # pas tuer l'étape (bash -eo pipefail). On capture l'erreur et on
            # retraite comme "unknown" pour continuer à poller.
            set +e
            RAW=$(curl -s --max-time 30 --connect-timeout 10 -u "${{ inputs.awx-username }}:${{ inputs.awx-password }}" \
              "http://ansible.cluster.auctelia.com/api/v2/jobs/${JOB_ID}/")
            set -e
            STATUS=$(echo "$RAW" | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")

            echo "Job status: ${STATUS} (elapsed: ${ELAPSED}s)"
            
            case "$STATUS" in
              "successful")
                echo "deployment-status=success" >> $GITHUB_OUTPUT
                echo "Deployment completed successfully!"
                exit 0
                ;;
              "failed"|"error"|"canceled")
                echo "deployment-status=failed" >> $GITHUB_OUTPUT
                echo "Deployment failed with status: ${STATUS}"
                exit 1
                ;;
              "running"|"pending"|"waiting")
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
              *)
                echo "Unknown status: ${STATUS}"
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
            esac
          done
          
          echo "deployment-status=timeout" >> $GITHUB_OUTPUT
          echo "Deployment timed out after ${TIMEOUT} seconds"
          exit 1
      shell: bash

    - name: Health Check (if URL provided)
      id: health-check
      if: inputs.health-check-url != ''
      run: |
          HEALTH_URL="${{ inputs.health-check-url }}"
          TIMEOUT="${{ inputs.health-check-timeout }}"
          ELAPSED=0
          INTERVAL=5
          
          echo "Starting health check on: ${HEALTH_URL}"
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            
            if [[ "$HTTP_CODE" =~ ^2[0-9][0-9]$ ]]; then
              echo "health-status=healthy" >> $GITHUB_OUTPUT
              echo "Health check passed! HTTP $HTTP_CODE"
              exit 0
            else
              echo "Health check failed with HTTP $HTTP_CODE (elapsed: ${ELAPSED}s)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            fi
          done
          
          echo "health-status=unhealthy" >> $GITHUB_OUTPUT
          echo "Health check failed after ${TIMEOUT} seconds"
          exit 1
      shell: bash

    - name: Rollback on Failure
      id: rollback
      if: failure() && inputs.rollback-enabled == 'true' && steps.get-current-state.outputs.current-version != 'unknown'
      run: |
          echo "Deployment or health check failed. Initiating rollback..."
          PREVIOUS_VERSION="${{ steps.get-current-state.outputs.current-version }}"
          
          if [[ "$PREVIOUS_VERSION" == "unknown" || "$PREVIOUS_VERSION" == "null" ]]; then
            echo "Cannot rollback: previous version is unknown"
            echo "rollback-status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Rolling back to version: ${PREVIOUS_VERSION}"
          
          ROLLBACK_RESPONSE=$(curl -s --max-time 30 --connect-timeout 10 -X POST "http://ansible.cluster.auctelia.com/api/v2/job_templates/${{ inputs.awx-services-id }}/launch/" \
            -H "Content-Type: application/json" \
            -u "${{ inputs.awx-username }}:${{ inputs.awx-password }}" \
            -d "{
                  \"extra_vars\":{
                    \"deploy_env\": \"${{ inputs.deploy-env }}\",
                    \"deploy_image_tag\": \"${PREVIOUS_VERSION}\",
                    \"docker_image\": \"${{ inputs.docker-image }}\",
                    \"time_bypass\": \"${{ inputs.time-bypass }}\"
                  }
                }")
          
          ROLLBACK_JOB_ID=$(echo "$ROLLBACK_RESPONSE" | jq -r '.id // empty')
          if [[ -z "$ROLLBACK_JOB_ID" ]]; then
            echo "Failed to start rollback job"
            echo "rollback-status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "Rollback job started with ID: ${ROLLBACK_JOB_ID}"
          
          # Wait for rollback to complete
          TIMEOUT=600
          ELAPSED=0
          INTERVAL=10
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            set +e
            RAW=$(curl -s --max-time 30 --connect-timeout 10 -u "${{ inputs.awx-username }}:${{ inputs.awx-password }}" \
              "http://ansible.cluster.auctelia.com/api/v2/jobs/${ROLLBACK_JOB_ID}/")
            set -e
            ROLLBACK_STATUS=$(echo "$RAW" | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")

            echo "Rollback status: ${ROLLBACK_STATUS} (elapsed: ${ELAPSED}s)"
            
            case "$ROLLBACK_STATUS" in
              "successful")
                echo "rollback-status=success" >> $GITHUB_OUTPUT
                echo "Rollback completed successfully!"
                exit 0
                ;;
              "failed"|"error"|"canceled")
                echo "rollback-status=failed" >> $GITHUB_OUTPUT
                echo "Rollback failed with status: ${ROLLBACK_STATUS}"
                exit 1
                ;;
              "running"|"pending"|"waiting")
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
              *)
                echo "Unknown rollback status: ${ROLLBACK_STATUS}"
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
            esac
          done
          
          echo "rollback-status=timeout" >> $GITHUB_OUTPUT
          echo "Rollback timed out after ${TIMEOUT} seconds"
          exit 1
      shell: bash
      
    - name: Disconnect VPN
      if: always()
      run: |
            sudo pkill openvpn || true
            echo "VPN disconnected"
      shell: bash
          
    - name: Send Slack Notification for Deployment
      if: always()
      run: |
          # Determine deployment status
          DEPLOY_STATUS="${{ steps.wait-deploy.outputs.deployment-status }}"
          HEALTH_STATUS="${{ steps.health-check.outputs.health-status }}"
          ROLLBACK_STATUS="${{ steps.rollback.outputs.rollback-status }}"
          
          # Determine overall status and message
          if [[ "$DEPLOY_STATUS" == "success" && ("$HEALTH_STATUS" == "healthy" || "$HEALTH_STATUS" == "") ]]; then
            STATUS="✅ SUCCESS"
            COLOR="good"
            MESSAGE="Deployment completed successfully"
          elif [[ "$ROLLBACK_STATUS" == "success" ]]; then
            STATUS="⚠️ ROLLED BACK"
            COLOR="warning"
            MESSAGE="Deployment failed and was rolled back successfully"
          elif [[ "$ROLLBACK_STATUS" == "failed" ]]; then
            STATUS="❌ CRITICAL"
            COLOR="danger"
            MESSAGE="Deployment failed and rollback also failed"
          else
            STATUS="❌ FAILED"
            COLOR="danger"
            MESSAGE="Deployment failed"
          fi
          
          # Prepare Slack payload
          PAYLOAD=$(cat << EOF
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "fields": [
                  {
                    "title": "Deployment Status",
                    "value": "${STATUS}",
                    "short": true
                  },
                  {
                    "title": "Application",
                    "value": "${{ inputs.app-name }}",
                    "short": true
                  },
                  {
                    "title": "Environment",
                    "value": "${{ inputs.deploy-env }}",
                    "short": true
                  },
                  {
                    "title": "Version",
                    "value": "v${{ github.run_number }}",
                    "short": true
                  },
                  {
                    "title": "Repository",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  }
                ],
                "footer": "GitHub Actions",
                "footer_icon": "https://github.com/favicon.ico",
                "ts": $(date +%s)
              }
            ],
            "text": "${MESSAGE}"
          }
          EOF
          )
          
          # Send notification
          curl -X POST -H 'Content-type: application/json' \
            --data "${PAYLOAD}" \
            "${{ inputs.tars-slack-webhook-url }}"
      shell: bash
